<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snowdrift OSS 测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }

        .upload-area:hover {
            background: #eef0ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e0e5ff;
            border-color: #764ba2;
        }

        .upload-icon {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #666;
            font-size: 16px;
        }

        #fileInput {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 15px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .file-list {
            margin-top: 20px;
        }

        .file-item {
            background: #f8f9ff;
            border: 1px solid #e0e5ff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
        }

        .file-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            color: #333;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .file-meta {
            color: #999;
            font-size: 12px;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 14px;
            margin: 0;
        }

        .btn-view {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .btn-delete {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        .message {
            padding: 12px 20px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .preview-modal.active {
            display: flex;
        }

        .preview-content {
            background: white;
            border-radius: 12px;
            max-width: 90%;
            max-height: 90%;
            overflow: auto;
            padding: 20px;
            position: relative;
        }

        .preview-close {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 30px;
            color: #333;
            cursor: pointer;
            z-index: 1001;
        }

        .preview-close:hover {
            color: #eb3349;
        }

        .preview-image {
            max-width: 100%;
            max-height: 80vh;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Snowdrift OSS 本地存储测试</h1>

        <!-- 上传区域 -->
        <div class="card">
            <h2>📤 文件上传</h2>
            <div id="message" class="message"></div>
            
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">点击选择文件或拖拽文件到此处</div>
                <input type="file" id="fileInput" multiple>
            </div>
            
            <div class="loading" id="uploadLoading">
                <div class="spinner"></div>
                <div>上传中...</div>
            </div>
        </div>

        <!-- 文件列表 -->
        <div class="card">
            <h2>📋 已上传文件</h2>
            <div id="fileList" class="file-list">
                <div class="empty-state">暂无文件</div>
            </div>
        </div>
    </div>

    <!-- 预览模态框 -->
    <div class="preview-modal" id="previewModal">
        <div class="preview-content">
            <span class="preview-close" onclick="closePreview()">&times;</span>
            <div id="previewBody"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/file';
        let uploadedFiles = [];

        // 上传区域点击
        document.getElementById('uploadArea').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        // 文件选择
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                await uploadFile(file);
            }
            e.target.value = '';
        });

        // 拖拽上传
        const uploadArea = document.getElementById('uploadArea');
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', async (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files);
            for (const file of files) {
                await uploadFile(file);
            }
        });

        // 上传文件
        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            document.getElementById('uploadLoading').classList.add('active');
            showMessage('', '');

            try {
                const response = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                
                if (result.code === 1) {
                    showMessage('✅ 文件上传成功: ' + file.name, 'success');
                    uploadedFiles.push(result.data);
                    renderFileList();
                } else {
                    showMessage('❌ 上传失败: ' + result.msg, 'error');
                }
            } catch (error) {
                showMessage('❌ 上传失败: ' + error.message, 'error');
            } finally {
                document.getElementById('uploadLoading').classList.remove('active');
            }
        }

        // 渲染文件列表
        function renderFileList() {
            const fileList = document.getElementById('fileList');
            
            if (uploadedFiles.length === 0) {
                fileList.innerHTML = '<div class="empty-state">暂无文件</div>';
                return;
            }

            fileList.innerHTML = uploadedFiles.map((file, index) => `
                <div class="file-item">
                    <div class="file-info">
                        <div class="file-name">${file.objectKey.split('/').pop()}</div>
                        <div class="file-meta">
                            大小: ${formatFileSize(file.size)} | 
                            路径: ${file.objectKey}
                        </div>
                    </div>
                    <div class="file-actions">
                        <button class="btn btn-small btn-view" onclick="viewFile('${file.url}')">预览</button>
                        <button class="btn btn-small btn-delete" onclick="deleteFile(${index})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        // 预览文件
        function viewFile(url) {
            const modal = document.getElementById('previewModal');
            const body = document.getElementById('previewBody');
            
            const ext = url.split('.').pop().toLowerCase();
            const imageExts = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp'];
            const videoExts = ['mp4', 'webm', 'ogg'];
            const audioExts = ['mp3', 'wav', 'ogg', 'aac'];

            if (imageExts.includes(ext)) {
                body.innerHTML = `<img src="${url}" class="preview-image" alt="preview">`;
            } else if (videoExts.includes(ext)) {
                body.innerHTML = `
                    <video controls style="max-width: 100%;">
                        <source src="${url}">
                        不支持的视频格式
                    </video>`;
            } else if (audioExts.includes(ext)) {
                body.innerHTML = `
                    <audio controls style="width: 100%;">
                        <source src="${url}">
                        不支持的音频格式
                    </audio>`;
            } else {
                body.innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <div style="font-size: 64px; margin-bottom: 20px;">📄</div>
                        <p>该文件类型暂不支持在线预览</p>
                        <a href="${url}" target="_blank" class="btn" style="display: inline-block; margin-top: 20px; text-decoration: none;">
                            下载文件
                        </a>
                    </div>`;
            }

            modal.classList.add('active');
        }

        // 关闭预览
        function closePreview() {
            document.getElementById('previewModal').classList.remove('active');
        }

        // 删除文件
        async function deleteFile(index) {
            const file = uploadedFiles[index];
            
            if (!confirm('确定要删除这个文件吗？')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/delete?objectKey=${encodeURIComponent(file.objectKey)}`, {
                    method: 'DELETE'
                });

                const result = await response.json();
                
                if (result.code === 1) {
                    showMessage('✅ 文件删除成功', 'success');
                    uploadedFiles.splice(index, 1);
                    renderFileList();
                } else {
                    showMessage('❌ 删除失败: ' + result.msg, 'error');
                }
            } catch (error) {
                showMessage('❌ 删除失败: ' + error.message, 'error');
            }
        }

        // 显示消息
        function showMessage(text, type) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.className = 'message ' + type;
            
            if (text) {
                setTimeout(() => {
                    msgEl.className = 'message';
                }, 3000);
            }
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // 点击模态框外部关闭
        document.getElementById('previewModal').addEventListener('click', (e) => {
            if (e.target.id === 'previewModal') {
                closePreview();
            }
        });
    </script>
</body>
</html>
