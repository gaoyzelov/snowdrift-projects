server:
  port: 8081

spring:
  application:
    name: snowdrift-sample
  
  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

# Snowdrift 配置
snowdrift:
  # OSS 配置
  oss:
    default-config-key: minio
    configs:
      local:
        oss-type: local
        enabled: true
        endpoint: D:/data/snowdrift-oss/sample  # 本地存储路径（Windows）
        # endpoint: /opt/data/snowdrift-oss/sample  # 本地存储路径（Linux）
        domain: http://localhost:8081/files  # 访问域名
        bucket: default
      minio:
        oss-type: minio
        enabled: true
        endpoint: http://192.168.1.220:9002  # MinIO 服务地址
        access-key: minioadmin           # MinIO Access Key
        secret-key: minioadmin           # MinIO Secret Key
        domain: http://192.168.1.220:9002    # MinIO 访问域名
        bucket: snowdrift-test           # Bucket 名称（会自动创建）
        path-prefix: sample/             # 路径前缀
        private-bucket: false            # 是否为私有 Bucket
        signature-expiry: 60             # 签名 URL 有效期（分钟）
      aliyun:
        oss-type: aliyun                    # 存储类型：阿里云 OSS
        endpoint: oss-cn-hangzhou.aliyuncs.com  # OSS Endpoint（不同区域不同）
        access-key: your-access-key-id      # AccessKey ID
        secret-key: your-access-key-secret  # AccessKey Secret
        domain: https://cdn.example.com     # 访问域名（CDN/公网）
        bucket: snowdrift-test              # Bucket 名称
        path-prefix: sample/                # 路径前缀
        private-bucket: false               # 是否为私有 Bucket
        signature-expiry: 60                # 签名 URL 有效期（分钟）
        enabled: true                       # 是否启用
        is-default: true                    # 是否为默认配置
        remark: 阿里云 OSS 默认配置
  
  # 国际化配置
  i18n:
    cache-seconds: 300
  
  # 静态资源映射
  resource:
    enabled: true
    mappings:
      - path-pattern: /files/**
        location: file:D:/data/snowdrift-oss/sample/
        # location: file:/opt/data/snowdrift-oss/sample/  # Linux 路径
        cache-period: 3600
        use-cache-control: true

# 日志配置
logging:
  level:
    com.snowdrift: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
